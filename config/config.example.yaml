service:
  http_addr: ":8080"
  grpc_addr: ":9093"
  api_key: "${MEDIA_API_KEY}"
  grpc_tls: false
database:
  url: "${MEDIA_DATABASE_URL}"
  auto_migrate: true
  migration_path: file://migrations
s3:
  endpoint: minio:9000
  # Browser multipart PUT URLs are signed against this address. It must be
  # publicly reachable and must preserve the exact signed Host header. A
  # directly published MinIO port is the safest local-development option.
  public_endpoint: localhost:9010
  access_key: "${S3_ACCESS_KEY}"
  secret_key: "${S3_SECRET_KEY}"
  bucket: media-blobs
  region: us-east-1
  use_ssl: false
  public_use_ssl: false
jobs:
  poll_interval: 1s
  lease_duration: 2m
  batch_size: 10
  max_retries: 2
uploads:
  upload_expiry: 24h
  download_expiry: 1h
  max_size: 10737418240
  max_parts: 10000
gc:
  interval: 10m
  grace_period: 24h
scanning:
  enabled: false
  clamav_address: clamav:3310
service_aliases:
  content:
    - content
profiles:
  thumbnail:
    kind: image
    mime: [image/jpeg, image/png, image/webp]
    output_extension: .webp
    output_mime: image/webp
    automatic: true
    command: [vipsthumbnail, "{input}", --size, 512x512, -o, "{output}"]
  preview:
    kind: video
    mime: [video/mp4, video/webm]
    output_extension: .jpg
    output_mime: image/jpeg
    automatic: false
    command: [ffmpeg, -i, "{input}", -frames:v, "1", "{output}"]
